name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Validate docs
        run: pnpm docs:validate

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build packages
        run: pnpm -r --if-present build

      - name: Verify scripts/lib build is in sync with source
        run: |
          npx tsc -p scripts/lib/tsconfig.json
          git diff --exit-code scripts/lib

      - name: Run tests
        run: pnpm test
        env:
          FORGEFLOW_DISPATCHER_DIST_PREBUILT: '1'

      - name: Run critical coverage
        run: pnpm coverage:critical
        env:
          FORGEFLOW_DISPATCHER_DIST_PREBUILT: '1'

      - name: Upload critical coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: critical-coverage
          path: coverage/
          if-no-files-found: error

      - name: Check git diff
        run: git diff --check
