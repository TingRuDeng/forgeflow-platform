name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "workspace package name, for example trae-beta-runtime"
        required: true
        type: string
      bump:
        description: "version bump type"
        required: true
        default: prerelease
        type: choice
        options:
          - major
          - minor
          - patch
          - prerelease
      tag:
        description: "npm dist-tag"
        required: true
        default: beta
        type: string
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.package || 'auto' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  security-events: write
  actions: read

jobs:
  detect-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has-packages: ${{ steps.detect.outputs.has-packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"

      - name: Detect packages needing release
        id: detect
        run: |
          PACKAGES='[]'
          
          for pkg_dir in packages/*/; do
            pkg_name=$(node -p "require('./${pkg_dir}package.json').name")
            local_version=$(node -p "require('./${pkg_dir}package.json').version")
            
            if [[ "$pkg_name" == @tingrudeng/* ]]; then
              npm_version=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")
              
              if [ "$local_version" != "$npm_version" ]; then
                echo "📦 $pkg_name: local=$local_version, npm=$npm_version -> NEEDS RELEASE"
                pkg_short=$(echo "$pkg_name" | sed 's/@tingrudeng\///')
                PACKAGES=$(echo "$PACKAGES" | jq -c --arg name "$pkg_short" --arg version "$local_version" '. += [{"name": $name, "version": $version}]')
              else
                echo "✓ $pkg_name: local=$local_version, npm=$npm_version -> up to date"
              fi
            fi
          done
          
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          if [ "$PACKAGES" != "[]" ]; then
            echo "has-packages=true" >> $GITHUB_OUTPUT
          else
            echo "has-packages=false" >> $GITHUB_OUTPUT
          fi

  publish-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Release preflight
        env:
          NPM_TRUSTED_PUBLISHING_ENABLED: ${{ vars.NPM_TRUSTED_PUBLISHING_ENABLED }}
        run: >
          node scripts/release-publish-preflight.mjs
          --package-dir packages/${{ inputs.package }}
          --expected-repo ${{ github.repository }}
          --require-trusted-publishing

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Bump package version
        run: |
          cd packages/${{ inputs.package }}
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ inputs.bump }}" == "prerelease" ]]; then
            if [[ "$CURRENT_VERSION" == *"-beta."* ]]; then
              BASE="${CURRENT_VERSION%%-beta.*}"
              PRE="${CURRENT_VERSION##*-beta.}"
              NEW_VERSION="${BASE}-beta.$((PRE + 1))"
            else
              NEW_VERSION="${CURRENT_VERSION}-beta.1"
            fi
          else
            # Strip prerelease suffix first
            CLEAN="${CURRENT_VERSION%%-beta.*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
            case "${{ inputs.bump }}" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi
          # Use npm version to update package.json (no git tag, no git commit)
          npm version "$NEW_VERSION" --no-git-tag-version --no-commit-hooks
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "📦 ${{ inputs.package }}: $CURRENT_VERSION → $NEW_VERSION"

      - name: Build package
        run: pnpm --filter @tingrudeng/${{ inputs.package }} build

      - name: Publish to npm with Trusted Publishing (OIDC)
        env:
          GITHUB_ACTIONS: "true"
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/${{ inputs.package }}
          npm publish --access public --provenance --tag ${{ inputs.tag }}
          echo "✅ Published @tingrudeng/${{ inputs.package }}@${{ env.NEW_VERSION }}"

  publish-disabled-summary:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has-packages == 'true' && vars.NPM_TRUSTED_PUBLISHING_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Release disabled summary
        run: |
          echo "## Auto Release Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Detected package version changes, but trusted publishing is intentionally gated off." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To enable auto publish:" >> "$GITHUB_STEP_SUMMARY"
          echo "- configure npm Trusted Publisher for repo \`${{ github.repository }}\` and the target \`@tingrudeng/*\` packages" >> "$GITHUB_STEP_SUMMARY"
          echo "- set repository/org variable \`NPM_TRUSTED_PUBLISHING_ENABLED=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pending package set:" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ needs.detect-changes.outputs.packages }}' | jq -r '.[] | "- \(.name)@\(.version)"' >> "$GITHUB_STEP_SUMMARY"

  publish-auto:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has-packages == 'true' && vars.NPM_TRUSTED_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: npm
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Release preflight
        id: preflight
        env:
          NPM_TRUSTED_PUBLISHING_ENABLED: ${{ vars.NPM_TRUSTED_PUBLISHING_ENABLED }}
        run: >
          node scripts/release-publish-preflight.mjs
          --package-dir packages/${{ matrix.package.name }}
          --expected-repo ${{ github.repository }}
          --require-trusted-publishing

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter @tingrudeng/${{ matrix.package.name }} build

      - name: Publish to npm with Trusted Publishing (OIDC)
        env:
          GITHUB_ACTIONS: "true"
        run: |
          cd packages/${{ matrix.package.name }}
          npm publish --access public --provenance --tag ${{ steps.preflight.outputs.dist_tag }}
          echo "✅ Published @tingrudeng/${{ matrix.package.name }}@${{ matrix.package.version }}"

  scorecard:
    needs: [publish-manual, publish-auto]
    if: always() && (needs.publish-manual.result == 'success' || needs.publish-auto.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
