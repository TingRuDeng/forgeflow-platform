name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "workspace package name, for example trae-beta-runtime"
        required: true
        type: string
      bump:
        description: "version bump type"
        required: true
        default: prerelease
        type: choice
        options:
          - major
          - minor
          - patch
          - prerelease
      tag:
        description: "npm dist-tag"
        required: true
        default: beta
        type: string
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.package || 'auto' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  detect-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has-packages: ${{ steps.detect.outputs.has-packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          package-manager-cache: false

      - name: Detect packages needing release
        id: detect
        run: |
          PACKAGES='[]'
          
          for pkg_dir in packages/*/; do
            pkg_name=$(node -p "require('./${pkg_dir}package.json').name")
            local_version=$(node -p "require('./${pkg_dir}package.json').version")
            
            if [[ "$pkg_name" == @tingrudeng/* ]]; then
              if npm view "${pkg_name}@${local_version}" version >/dev/null 2>&1; then
                echo "✓ $pkg_name@$local_version already exists on npm -> up to date"
              else
                echo "📦 $pkg_name@$local_version is not published yet -> NEEDS RELEASE"
                pkg_short=$(echo "$pkg_name" | sed 's/@tingrudeng\///')
                PACKAGES=$(echo "$PACKAGES" | jq -c --arg name "$pkg_short" --arg version "$local_version" '. += [{"name": $name, "version": $version}]')
              fi
            fi
          done
          
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          if [ "$PACKAGES" != "[]" ]; then
            echo "has-packages=true" >> $GITHUB_OUTPUT
          else
            echo "has-packages=false" >> $GITHUB_OUTPUT
          fi

  publish-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11.12.1
          npm --version

      - name: Release preflight
        env:
          NPM_TRUSTED_PUBLISHING_ENABLED: ${{ vars.NPM_TRUSTED_PUBLISHING_ENABLED }}
        run: >
          node scripts/release-publish-preflight.mjs
          --package-dir packages/${{ inputs.package }}
          --expected-repo ${{ github.repository }}
          --require-trusted-publishing

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run shadow drift gate
        run: pnpm verify:shadow-drift

      - name: Bump package version
        run: |
          cd packages/${{ inputs.package }}
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ inputs.bump }}" == "prerelease" ]]; then
            if [[ "$CURRENT_VERSION" == *"-beta."* ]]; then
              BASE="${CURRENT_VERSION%%-beta.*}"
              PRE="${CURRENT_VERSION##*-beta.}"
              NEW_VERSION="${BASE}-beta.$((PRE + 1))"
            else
              NEW_VERSION="${CURRENT_VERSION}-beta.1"
            fi
          else
            # Strip prerelease suffix first
            CLEAN="${CURRENT_VERSION%%-beta.*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
            case "${{ inputs.bump }}" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi
          npm version "$NEW_VERSION" --no-git-tag-version --no-commit-hooks
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "📦 ${{ inputs.package }}: $CURRENT_VERSION → $NEW_VERSION"

      - name: Build package
        run: pnpm --filter @tingrudeng/${{ inputs.package }} build

      - name: Publish to npm with Trusted Publishing (OIDC)
        id: publish
        env:
          GITHUB_ACTIONS: "true"
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/${{ inputs.package }}
          cp package.json "$RUNNER_TEMP/release-package-json-before-publish"
          npm publish --access public --provenance --tag ${{ inputs.tag }}
          cp "$RUNNER_TEMP/release-package-json-before-publish" package.json
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "✅ Published @tingrudeng/${{ inputs.package }}@${{ env.NEW_VERSION }}"

      - name: Record published package version in git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/${{ inputs.package }}/package.json
          git diff --cached --quiet && {
            echo "No package.json version change to record after publish"
            exit 1
          }
          git commit -m "chore(release): 发布 @tingrudeng/${{ inputs.package }}@${{ env.NEW_VERSION }} [skip actions]"
          git tag -a "release/${{ inputs.package }}@${{ env.NEW_VERSION }}" -m "release @tingrudeng/${{ inputs.package }}@${{ env.NEW_VERSION }}"
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags

      - name: Summarize post-publish git recovery
        if: ${{ failure() && steps.publish.outcome == 'success' }}
        run: |
          {
            echo "## 手动发布需要恢复"
            echo ""
            echo "npm publish 已成功，但 git commit/tag/push 记录失败。"
            echo ""
            echo "- package: @tingrudeng/${{ inputs.package }}"
            echo "- version: ${{ env.NEW_VERSION }}"
            echo "- tag: release/${{ inputs.package }}@${{ env.NEW_VERSION }}"
            echo ""
            echo "恢复方式：确认 npm 上该版本存在后，在 main 上补交 packages/${{ inputs.package }}/package.json 的版本变更，并创建同名 release tag。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 创建发布后 git 恢复 issue
        if: ${{ failure() && steps.publish.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PACKAGE: ${{ inputs.package }}
          RELEASE_VERSION: ${{ env.NEW_VERSION }}
          RELEASE_TAG: release/${{ inputs.package }}@${{ env.NEW_VERSION }}
        run: |
          ISSUE_BODY="$RUNNER_TEMP/release-recovery-issue.md"
          cat > "$ISSUE_BODY" <<EOF
          npm publish 已成功，但 git commit / tag / push 记录失败，需要人工补齐版本记录。

          - package: @tingrudeng/${RELEASE_PACKAGE}
          - version: ${RELEASE_VERSION}
          - tag: ${RELEASE_TAG}
          - workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          恢复方式：
          1. 确认 npm 上 @tingrudeng/${RELEASE_PACKAGE}@${RELEASE_VERSION} 已存在。
          2. 在 main 上补交 packages/${RELEASE_PACKAGE}/package.json 的版本变更。
          3. 创建同名 release tag：${RELEASE_TAG}。
          4. 推送 commit 和 tag 后关闭本 issue。
          EOF
          gh issue create \
            --title "手动发布需要恢复：@tingrudeng/${RELEASE_PACKAGE}@${RELEASE_VERSION}" \
            --body-file "$ISSUE_BODY"

  publish-disabled-summary:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has-packages == 'true' && vars.NPM_TRUSTED_PUBLISHING_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Release disabled summary
        run: |
          echo "## Auto Release Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Detected package version changes, but trusted publishing is intentionally gated off." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To enable auto publish:" >> "$GITHUB_STEP_SUMMARY"
          echo "- configure npm Trusted Publisher for repo \`${{ github.repository }}\` and the target \`@tingrudeng/*\` packages" >> "$GITHUB_STEP_SUMMARY"
          echo "- set repository/org variable \`NPM_TRUSTED_PUBLISHING_ENABLED=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pending package set:" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ needs.detect-changes.outputs.packages }}' | jq -r '.[] | "- \(.name)@\(.version)"' >> "$GITHUB_STEP_SUMMARY"

  publish-auto:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has-packages == 'true' && vars.NPM_TRUSTED_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11.12.1
          npm --version

      - name: Release preflight
        id: preflight
        env:
          NPM_TRUSTED_PUBLISHING_ENABLED: ${{ vars.NPM_TRUSTED_PUBLISHING_ENABLED }}
        run: >
          node scripts/release-publish-preflight.mjs
          --package-dir packages/${{ matrix.package.name }}
          --expected-repo ${{ github.repository }}
          --require-trusted-publishing

      - name: Check deprecated entrypoints
        run: node scripts/check-deprecated-entrypoints.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run shadow drift gate
        run: pnpm verify:shadow-drift

      - name: Check if exact version is already published
        id: version_check
        run: |
          PACKAGE="@tingrudeng/${{ matrix.package.name }}"
          VERSION="${{ matrix.package.version }}"
          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "⚪ ${PACKAGE}@${VERSION} already exists on npm; skipping build and publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version_check.outputs.already_published != 'true'
        run: pnpm --filter @tingrudeng/${{ matrix.package.name }} build

      - name: Publish to npm with Trusted Publishing (OIDC)
        if: steps.version_check.outputs.already_published != 'true'
        env:
          GITHUB_ACTIONS: "true"
        run: |
          cd packages/${{ matrix.package.name }}
          npm publish --access public --provenance --tag ${{ steps.preflight.outputs.dist_tag }}
          echo "✅ Published @tingrudeng/${{ matrix.package.name }}@${{ matrix.package.version }}"
